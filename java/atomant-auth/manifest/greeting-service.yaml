apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: greeting-function
spec:
  template:
    spec:
      containers:
        - image: docker.io/joelmaykon/atomant-auth:latest
          ports:
            - containerPort: 8080
          env:
            - name: JAVA_OPTS
              value: "-Xmx512m -Xms256m"
            - name: QUARKUS_HTTP_PORT
              value: "8080"
            - name: QUARKUS_HTTP_HOST
              value: "0.0.0.0"